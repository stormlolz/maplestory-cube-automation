name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # allows manual trigger from any branch

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller cube_automation.spec

      - name: Upload artifact (for manual builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CubeAutomation-windows
          path: dist/CubeAutomation/

      - name: Zip output (for tag releases)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist/CubeAutomation/* -DestinationPath "dist/CubeAutomation-$($env:GITHUB_REF_NAME)-windows.zip"

      - name: Create Release (for tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CubeAutomation-*-windows.zip
          generate_release_notes: true
